name: Test obsidian-tracker

on:
  push:
    paths:
      - 'plugins/obsidian-tracker/**'
  pull_request:
    paths:
      - 'plugins/obsidian-tracker/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install MCP dependencies
        working-directory: plugins/obsidian-tracker/mcp
        run: npm ci

      - name: Build MCP server
        working-directory: plugins/obsidian-tracker/mcp
        run: npm run build

      - name: Plugin structure tests
        working-directory: plugins/obsidian-tracker
        run: bats tests/plugin_structure.bats

      - name: Hook tests
        working-directory: plugins/obsidian-tracker
        run: bats tests/hooks/

      - name: MCP unit tests
        working-directory: plugins/obsidian-tracker/mcp
        run: npm test
